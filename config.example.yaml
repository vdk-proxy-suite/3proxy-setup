install:
  version: "0.9.7"
  source_url: "https://github.com/3proxy/3proxy/archive/refs/tags/0.9.7.tar.gz"
  sha256: "efe862ef8b7c0ddf7b1c45d6b5d72f0b7cd0a3c54447419c7f1bd2239a06fc30"

server:
  public_ip: "203.0.113.10"
  listen_ip: "0.0.0.0"
  udp_client_cidr: "0.0.0.0/0"
  manage_ufw: false

logging:
  format: "monitor_v1"
  rotation: "daily"
  keep_files: 14
  compress: true

local_auth:
  username: "CHANGE_ME"
  password: "CHANGE_ME"

upstreams:
  socks_primary:
    type: "socks5"
    host: "198.51.100.10"
    port: 1080
    username: "CHANGE_ME"
    password: "CHANGE_ME"
    expected_egress_ip: "198.51.100.10"
    capabilities: [tcp, udp]
  http_primary:
    type: "http"
    host: "198.51.100.10"
    port: 8080
    username: "CHANGE_ME"
    password: "CHANGE_ME"
    expected_egress_ip: "198.51.100.10"
    capabilities: [tcp]

listeners:
  - id: "socks_direct"
    protocol: "socks5"
    port: 1080
    parent: "direct"
    capabilities: [tcp, udp]
  - id: "socks_via_socks"
    protocol: "socks5"
    port: 1081
    parent: "socks_primary"
    capabilities: [tcp, udp]
  - id: "socks_via_http"
    protocol: "socks5"
    port: 1082
    parent: "http_primary"
    capabilities: [tcp]
  - id: "http_direct"
    protocol: "http"
    port: 8080
    parent: "direct"
    capabilities: [tcp]
  - id: "http_via_socks"
    protocol: "http"
    port: 8081
    parent: "socks_primary"
    capabilities: [tcp]
  - id: "http_via_http"
    protocol: "http"
    port: 8082
    parent: "http_primary"
    capabilities: [tcp]

probes:
  timeout_seconds: 8
  http_host: "api.ipify.org"
  http_port: 80
  dns_server: "1.1.1.1"
  dns_port: 53
  stun_servers:
    - host: "stun.l.google.com"
      port: 19302
    - host: "stun.cloudflare.com"
      port: 3478
